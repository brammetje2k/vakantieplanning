<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐰 Familie & Konijnen Planner</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root { --primary: #4CAF50; --secondary: #FF9800; --bg: #f0f2f0; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-box { background: white; padding: 30px; border-radius: 20px; color: #333; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 85%; max-width: 320px; }
        
        #wachtwoord-veld { 
            width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; 
            font-size: 1.1em; text-align: center; box-sizing: border-box;
        }
        
        .login-btn { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }

        #main-content { display: none; width: 100%; max-width: 450px; padding-bottom: 120px; }
        .info-box { background: #fff8e1; padding: 15px; border-radius: 12px; font-size: 0.85em; margin-bottom: 20px; border-left: 5px solid var(--secondary); }
        .day-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-left: 5px solid var(--primary); }
        
        .date-header { font-weight: bold; font-size: 1.1em; color: #333; margin-bottom: 2px; }
        .fish-reminder { color: #0288d1; font-size: 0.85em; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        
        .waste-tag { background: #fff3e0; color: #e65100; padding: 5px 10px; border-radius: 6px; font-size: 0.8em; font-weight: bold; margin-bottom: 12px; display: inline-block; }
        .task-group { margin-top: 8px; padding: 12px; background: #f8faf8; border-radius: 10px; border: 1px solid #edf0ed; }
        .task-item { display: flex; align-items: center; margin: 5px 0; font-size: 0.95em; }
        input[type="checkbox"] { width: 26px; height: 26px; margin-right: 12px; accent-color: var(--primary); }
        .assignee-select { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; background: white; }
        
        .footer-contact-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 5px; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .contact-button { background-color: #333; color: white; padding: 10px 12px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 0.75em; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h3>Beveiligde Toegang</h3>
        <div id="login-form">
            <p>Voer het wachtwoord in:</p>
            <input type="text" id="wachtwoord-veld" placeholder="Typ wachtwoord..." autocomplete="off">
            <button class="login-btn" onclick="checkPin()">Open Planner</button>
            <p id="error-msg" style="color:red; display:none; font-size: 0.8em; margin-top:10px;">Onjuiste code!</p>
        </div>
        <div id="expired-msg" style="display:none;">
            <p style="font-size: 1.2em;">🔒 <b>Toegang Verlopen</b></p>
            <p>Deze planner was geldig tot 11 april 2026.</p>
        </div>
    </div>
</div>

<div id="main-content">
    <header style="text-align:center; margin-bottom:20px;">
        <h1>🐰 Konijnen & Vissen</h1>
        <div style="font-size: 0.7em; color: var(--primary);">● LIVE VERBONDEN</div>
    </header>

    <div class="container" id="calendar-container"></div>

    <div class="footer-contact-bar">
        <a href="https://wa.me/31623568453" class="contact-button"><i class="fab fa-whatsapp"></i> Bram</a>
        <a href="https://wa.me/31657505759" class="contact-button"><i class="fab fa-whatsapp"></i> Amber</a>
        <a href="https://wa.me/31620915222" class="contact-button"><i class="fab fa-whatsapp"></i> Sylvia</a>
    </div>
</div>

<script>
    const blockDate = new Date(2026, 3, 11); 
    
    window.onload = function() {
        if (new Date() >= blockDate) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('expired-msg').style.display = 'block';
        }
    };

    function checkPin() {
        const pin = document.getElementById('wachtwoord-veld').value.trim();
        // Wachtwoord is nu Borrelplank (met hoofdletter)
        if(pin === "Borrelplank") {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderCalendar();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    const firebaseConfig = {
        apiKey: "AIzaSyBXjLtvpTSu5F6cSEAj_MbDV_nHHJqvuN0",
        authDomain: "konijnenplanning.firebaseapp.com",
        projectId: "konijnenplanning",
        storageBucket: "konijnenplanning.firebasestorage.app",
        messagingSenderId: "427455485997",
        appId: "1:427455485997:web:cec09769cf4df42e8e40a4",
        measurementId: "G-BXZJ9F5R4F",
        databaseURL: "https://konijnenplanning-default-rtdb.europe-west1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const wasteSchedule = { 
        "2026-03-27": "⚠️ GIF afval", 
        "2026-04-03": "📄 Karton", 
        "2026-04-04": "🟠 Plastic", 
        "2026-04-10": "🗑️ Restafval" 
    };

    const startDate = new Date(2026, 2, 26);
    const endDate = new Date(2026, 3, 10);

    function renderCalendar() {
        const container = document.getElementById('calendar-container');
        container.innerHTML = "";
        let currentDate = new Date(startDate);

        while (currentDate <= endDate) {
            const dateStr = currentDate.toISOString().split('T')[0];
            const displayDate = currentDate.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
            const isWaste = wasteSchedule[dateStr];
            
            // Check of het donderdag 26 maart is voor Sylvia optie
            const isMarch26 = dateStr === "2026-03-26";
            const sylviaOption = isMarch26 ? '<option value="Sylvia">Sylvia</option>' : '';

            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="date-header">${displayDate}</div>
                <div class="fish-reminder"><i class="fas fa-fish"></i> Vissen gevoerd vandaag?</div>
                ${isWaste ? `<div class="waste-tag"><i class="fas fa-trash"></i> ${isWaste} buiten!</div>` : ''}
                
                <div class="task-group">
                    <strong>☀️ Ochtend</strong>
                    <label class="task-item">
                        <input type="checkbox" id="${dateStr}-am-check" onchange="updateFirebase('${dateStr}', 'am', 'check', this.checked)"> Eten & Water ✅
                    </label>
                    <select id="${dateStr}-am-who" class="assignee-select" onchange="updateFirebase('${dateStr}', 'am', 'who', this.value)">
                        <option value="">Wie voerde er?</option>
                        <option value="Bram">Bram</option>
                        <option value="Amber">Amber</option>
                        ${sylviaOption}
                    </select>
                </div>
                
                <div class="task-group">
                    <strong>🌙 Avond</strong>
                    <label class="task-item">
                        <input type="checkbox" id="${dateStr}-pm-check" onchange="updateFirebase('${dateStr}', 'pm', 'check', this.checked)"> Witlof check ✅
                    </label>
                    <select id="${dateStr}-pm-who" class="assignee-select" onchange="updateFirebase('${dateStr}', 'pm', 'who', this.value)">
                        <option value="">Wie voerde er?</option>
                        <option value="Bram">Bram</option>
                        <option value="Amber">Amber</option>
                        ${sylviaOption}
                    </select>
                </div>
            `;
            container.appendChild(card);
            currentDate.setDate(currentDate.getDate() + 1);
        }

        db.ref('konijnen_status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                for (let date in data) {
                    if (data[date].am) {
                        const amCheck = document.getElementById(`${date}-am-check`);
                        const amWho = document.getElementById(`${date}-am-who`);
                        if(amCheck) amCheck.checked = data[date].am.check || false;
                        if(amWho) amWho.value = data[date].am.who || "";
                    }
                    if (data[date].pm) {
                        const pmCheck = document.getElementById(`${date}-pm-check`);
                        const pmWho = document.getElementById(`${date}-pm-who`);
                        if(pmCheck) pmCheck.checked = data[date].pm.check || false;
                        if(pmWho) pmWho.value = data[date].pm.who || "";
                    }
                }
            }
        });
    }

    function updateFirebase(date, time, field, value) {
        db.ref('konijnen_status/' + date + '/' + time).update({ [field]: value });
    }
</script>

</body>
</html>
